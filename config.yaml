# ===== 目标窗口 =====
window:
  title_keyword: "简幻欢|WeChatAppEx|微信"  # 窗口关键词(按优先级|分隔)
  auto_focus: true                           # 每次操作前自动激活窗口

# ===== 时间控制 =====
timing:
  init_wait: 3               # 启动后等待窗口稳定(秒)
  ad_click_wait: 2           # 点击"观看广告"后等待(秒)
  ad_watch_seconds: 32       # 广告观看时长(秒)，略大于30s留余量
  check_interval: 2          # 通用检测间隔(秒)
  close_ad_wait: 2           # 关闭广告后等待(秒)
  reward_wait: 3             # 等待奖励提示(秒)

# ===== OCR 识别关键词 =====
matching:
  # 第1页：订阅提醒弹窗（两个选项：不再提醒 / 好的）
  subscribe_keywords: ["订阅提醒", "好的", "不再提示", "不再提醒"]
  # 第2页：签到标签（点击后进入签到页面，不点"开始签到"）
  checkin_keywords: ["签到"]
  # 第3页：观看广告按钮
  ad_keywords: ["观看广告"]
  # 关闭广告按钮（广告播放30s后点关闭正常退出）
  close_keywords: ["关闭"]
  # 广告中断弹窗（不小心点了关闭，提示没看完没有奖励）
  # 弹窗有两个选项：放弃 / 继续
  interrupt_keywords: ["暂未获得奖励", "没有看完", "没有奖励"]
  continue_keywords: ["继续"]
  # 放弃按钮（如果误点了放弃，也要继续循环）
  give_up_keywords: ["放弃"]
  # 奖励提示（广告看完后的冒泡文字）
  reward_keywords: ["获得签到奖励", "签到奖励", "获得奖励"]
  loading_keywords: ["加载中"]
  # 今日上限提示
  limit_keywords: ["今日的看广告获得积分已经到达上限", "到达上限", "今日上限"]
  # 弹窗×按钮（插屏广告，第6步）
  popup_close_keywords: ["×", "X", "✕", "✖"]
  # 连续未找到"观看广告"多少次后认为达到每日上限
  max_ad_not_found: 5

# ===== 循环控制 =====
loop:
  max_rounds: 0  # 最大循环次数，0=无限
